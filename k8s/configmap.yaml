apiVersion: v1
kind: ConfigMap
metadata:
  name: service-config
  namespace: video-app
data:
  MYSQL_HOST: mysql-0.mysql.video-app.svc.cluster.local
  MYSQL_PORT: "3306"
  MYSQL_DB: videodb
  AUTH_SERVICE_URL: "http://auth-service:5001"
  FILE_SERVICE_URL: "http://file-service:5002"
  MYSQL_SERVICE_URL: "http://mysql-service:5003"
  STREAM_EXTERNAL_URL: "http://localhost:5004"
  UPLOAD_EXTERNAL_URL: "http://localhost:5000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init
  namespace: video-app
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS videodb;
    USE videodb;

    CREATE TABLE IF NOT EXISTS users (
        id INT AUTO_INCREMENT PRIMARY KEY,
        username VARCHAR(100) UNIQUE NOT NULL,
        email VARCHAR(150) UNIQUE NOT NULL,
        password_hash VARCHAR(255) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS videos (
        id INT AUTO_INCREMENT PRIMARY KEY,
        title VARCHAR(255) NOT NULL,
        filename VARCHAR(255) NOT NULL,
        file_path VARCHAR(500) NOT NULL,
        file_size BIGINT,
        content_type VARCHAR(100),
        uploaded_by INT,
        uploaded_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
        FOREIGN KEY (uploaded_by) REFERENCES users(id)
    );
