apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-service
  namespace: video-app
  labels:
    app: mysql-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mysql-service
  template:
    metadata:
      labels:
        app: mysql-service
    spec:
      containers:
        - name: mysql-service
          image: tsripan/mysql-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5003
          env:
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: MYSQL_PORT
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_DB
              valueFrom:
                configMapKeyRef:
                  name: service-config
                  key: MYSQL_DB
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: video-app
spec:
  selector:
    app: mysql-service
  ports:
    - port: 5003
      targetPort: 5003
