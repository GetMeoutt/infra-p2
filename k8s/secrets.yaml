apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: video-app
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: rootpassword
  MYSQL_PASSWORD: videopassword
  MYSQL_USER: videouser
  MYSQL_DATABASE: videodb
---
apiVersion: v1
kind: Secret
metadata:
  name: auth-secret
  namespace: video-app
type: Opaque
stringData:
  SECRET_KEY: your-secret-key-change-in-production
